name: Deploy Docusaurus to GitHub Pages

on:
  push:
    branches:
      - master # Change this if your default branch is 'master'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm # Change to yarn or pnpm if you use them

      - name: Install dependencies
        run: npm ci # Use 'yarn install --immutable' or 'pnpm install --frozen-lockfile' if applicable

      - name: Build website
        run: npm run build

      - name: Add .nojekyll file
        # This prevents GitHub Pages from trying to run Jekyll over your Docusaurus build files
        run: touch build/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4